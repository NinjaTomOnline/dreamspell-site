<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Dreamspell annual transition</title>
  <desc id="desc">A visual guide to the annual Dreamspell handoff from 13 moons to the Day Out of Time and the new year on July 26.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#120d0f"/>
      <stop offset="55%" stop-color="#0d0a0b"/>
      <stop offset="100%" stop-color="#070607"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="0" cy="0" r="1">
      <stop offset="0%" stop-color="#f2c743" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#f2c743" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="1" cy="0" r="1">
      <stop offset="0%" stop-color="#3e98e5" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#3e98e5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f2c743" stop-opacity="0.28"/>
      <stop offset="45%" stop-color="#ffe39c" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3e98e5" stop-opacity="0.45"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="150" cy="90" r="230" fill="url(#glowLeft)"/>
  <circle cx="1010" cy="130" r="220" fill="url(#glowRight)"/>

  <g font-family="Helvetica">
    <text x="84" y="86" fill="#ffe39c" font-size="21" font-weight="800" letter-spacing="4">DREAMSPELL ANNUAL GUIDE</text>
    <text x="84" y="154" fill="#fff8ea" font-size="62" font-weight="800">13 Moons</text>
    <text x="84" y="220" fill="#fff8ea" font-size="62" font-weight="800">Day Out of Time</text>
    <text x="84" y="286" fill="#fff8ea" font-size="62" font-weight="800">July 26 New Year</text>
    <text x="84" y="348" fill="#cbbfc1" font-size="28" font-weight="500">A one-glance map of the counted year, the yearly threshold, and the restart of the next Dreamspell cycle.</text>
  </g>

  <g transform="translate(84 406)" filter="url(#shadow)">
    <rect x="0" y="0" width="1032" height="164" rx="34" fill="#130f10" fill-opacity="0.92" stroke="#4a3730" stroke-opacity="0.9"/>
    <rect x="44" y="78" width="944" height="2" rx="1" fill="url(#rail)"/>

    <g transform="translate(42 24)">
      <circle cx="44" cy="54" r="27" fill="#1e1718" stroke="#f2c743" stroke-opacity="0.55"/>
      <text x="44" y="61" text-anchor="middle" fill="#fff2c0" font-family="Helvetica" font-size="22" font-weight="800">1</text>
      <text x="0" y="120" fill="#ffe39c" font-family="Helvetica" font-size="16" font-weight="800" letter-spacing="2">364 COUNTED DAYS</text>
      <text x="0" y="150" fill="#ffffff" font-family="Helvetica" font-size="28" font-weight="800">13 Moons</text>
    </g>

    <g transform="translate(418 24)">
      <circle cx="44" cy="54" r="27" fill="#1e1718" stroke="#f2c743" stroke-opacity="0.55"/>
      <text x="44" y="61" text-anchor="middle" fill="#fff2c0" font-family="Helvetica" font-size="22" font-weight="800">2</text>
      <text x="0" y="120" fill="#ffe39c" font-family="Helvetica" font-size="16" font-weight="800" letter-spacing="2">JULY 25 THRESHOLD</text>
      <text x="0" y="150" fill="#ffffff" font-family="Helvetica" font-size="28" font-weight="800">Day Out of Time</text>
    </g>

    <g transform="translate(780 24)">
      <circle cx="44" cy="54" r="27" fill="#1e1718" stroke="#f2c743" stroke-opacity="0.55"/>
      <text x="44" y="61" text-anchor="middle" fill="#fff2c0" font-family="Helvetica" font-size="22" font-weight="800">3</text>
      <text x="0" y="120" fill="#ffe39c" font-family="Helvetica" font-size="16" font-weight="800" letter-spacing="2">JULY 26 RESTART</text>
      <text x="0" y="150" fill="#ffffff" font-family="Helvetica" font-size="28" font-weight="800">Dreamspell New Year</text>
    </g>
  </g>

  <g font-family="Helvetica">
    <text x="84" y="594" fill="#a89c9e" font-size="22" font-weight="600">Learn the annual rhythm and download the live app at getdreamspell.com</text>
  </g>
</svg>
